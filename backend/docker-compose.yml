version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: onlyunited_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "onlyunited123!"
      MYSQL_DATABASE: "onlyunited_db"
      TZ: "Asia/Seoul"
      # 문자셋/콜레이션 기본값을 원하면 아래와 같이 command에 지정
    command: [
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci",
      "--default-authentication-plugin=mysql_native_password"
    ]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
